[proxy]
server_port = 8080

[api]
server_port = 8081
key = "change-me-api-key"

[browser_challenge]
enabled = true
cookie_ttl = 86400        # 秒，PoW Cookie 有效期
challenge_ttl = 300       # 秒，挑战有效期
secret = "change-me-pow-secret"

[browser_challenge.pow]
difficulty = 16           # 前导零 bit 数

[cache]
enabled = true
ttl = 60                  # 秒
max_entries = 1000
max_body_bytes = 1048576  # 1 MiB

# ── 验证码 (可选) ──────────────────────────────────────────────────────────
# 启用时需指定 type 并将对应 provider 的 enabled 设为 true、填入凭据。
# 不配置整个 [captcha] 或所有 provider enabled=false 则验证码下线。

[captcha]
# type = "recaptcha"

[captcha.recaptcha]
enabled = false
site_key = ""
secret_key = ""

[captcha.hcaptcha]
enabled = false
site_key = ""
secret_key = ""

[captcha.geetest]
enabled = false
id = ""
key = ""

[captcha.turnstile]
enabled = false
site_key = ""
secret_key = ""

[captcha.funcaptcha]
enabled = false
public_key = ""
private_key = ""

[captcha.aliyun]
enabled = false
access_key_id = ""
access_key_secret = ""

[captcha.tencent]
enabled = false
secret_id = ""
secret_key = ""

# ── 站点配置 ────────────────────────────────────────────────────────────────

[site.example]
hostname = "example.com"

[site.example.backend]
url = "http://127.0.0.1:80"
hostname = "example.com"

[site.example.backend.headers]
# "X-Real-IP" = "{{{http.request.headers['X-Forwarded-For']}}}"

# 规则：放行 robots.txt / sitemap.xml（无挑战）
[[site.example.rules]]
id = "allow-static"
description = "allow robots and sitemap"
condition = '["/robots.txt", "/sitemap.xml"].includes(http.request.uri.path)'

[site.example.rules.actions.browser_challenge]
enabled = false

# 规则：wiki 页面缓存（无挑战，命中后跳出）
[[site.example.rules]]
id = "cache-wiki"
condition = 'http.request.uri.path.match(/^\\/wiki\\/[^?]+$/)'
last = true

[site.example.rules.actions.cache]
enabled = true
ttl = 300
key = "path+query"

[site.example.rules.actions.browser_challenge]
enabled = false
