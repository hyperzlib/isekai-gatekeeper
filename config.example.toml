debug = false
templates_dir = "./views"

[proxy]
server_port = 8080

[api]
server_port = 8081
key = "change-me-api-key"

[cluster]
enabled = false
num_workers = 0 # 0 表示自动使用 CPU 核心数
admin_host = "127.0.0.1"

[browser_challenge]
enabled = true
cookie_ttl = 86400        # 秒，PoW Cookie 有效期
challenge_ttl = 300       # 秒，挑战有效期
secret = "change-me-pow-secret"

[browser_challenge.pow]
difficulty = 16           # 前导零 bit 数

[cache]
enabled = true
provider = "memory"          # 可选 "memory" 或 "bun+redis"
default_ttl = 60              # 秒
cache_key_mode = "path+query" # 可选 "path+query" 或 "path"
max_entries = 1000
max_body_bytes = 1048576    # 1 MiB
allowed_mimetypes = ["text/html", "application/json", "text/plain", "text/css", "application/javascript", "text/javascript"]

[cache.bun_redis]
url = "redis://localhost:6379"

# ── GeoIP (可选) ────────────────────────────────────────────────────────────
# 需要从 https://dev.maxmind.com/geoip/geolite2-free-geolocation-data 下载数据库

[geoip]
enabled = false
# db_country_path = "./data/geoip/GeoLite2-Country.mmdb"
# db_asn_path = "./data/geoip/GeoLite2-ASN.mmdb"
# db_city_path = "./data/geoip/GeoLite2-City.mmdb"

# ── 验证码 (可选) ──────────────────────────────────────────────────────────
# 启用时需取消 [captcha] 的注释、指定 type，并填入对应 provider 的凭据。
# 不配置整个 [captcha] 或 enabled=false 则验证码下线。

[captcha]
# enabled = true
# type = "recaptcha"

[captcha.recaptcha]
site_key = ""
secret_key = ""
# api_domain = "recaptcha.net"       # 可选，默认为 google.com
# js_domain = "recaptcha.net"        # 可选，默认为 google.com

[captcha.hcaptcha]
site_key = ""
secret_key = ""

[captcha.geetest]
id = ""
key = ""

[captcha.turnstile]
site_key = ""
secret_key = ""

[captcha.funcaptcha]
public_key = ""
private_key = ""

[captcha.aliyun]
access_key_id = ""
access_key_secret = ""

[captcha.tencent]
secret_id = ""
secret_key = ""

# ── 站点配置 ────────────────────────────────────────────────────────────────

[site.example]
hostname = "example.com"

[site.example.backend]
url = "http://127.0.0.1:80"
hostname = "example.com"

[site.example.backend.headers]
# "X-Real-IP" = "{{{ctx.req.headers['X-Forwarded-For']}}}"
"X-Proxy-Server" = "isekai-gatekeeper"
# 兼容 Cloudflare 的 Headers
"CF-IPCountry" = "{{{ctx.geoip?.country_code ?? 'XX'}}}"
"CF-Visitor" = '{"scheme":"{{{ctx.protocol}}}"}'

# 规则：放行 robots.txt / sitemap.xml
[[site.example.rules]]
id = "allow-static"
description = "allow robots and sitemap"
condition = '["/robots.txt", "/sitemap.xml"].includes(http.request.uri.path)'
browser_challenge = { enabled = false }

# 规则：放行预设中的常见搜索引擎爬虫 UA
[[site.example.rules]]
id = "allow-bot-user-agent"
description = "allow bot user agent"
condition = "presets.isCommonSearchEngineBot"
browser_challenge = { enabled = false }

# 规则：放行 wiki 页面 (返回缓存)
[[site.example.rules]]
id = "cache-wiki"
condition = 'matchGlob(http.request.uri.path, "/wiki/*")'
last = true
cache = { enabled = true, ttl = 86400, cache_key_mode = "path+query" }
browser_challenge = { enabled = false }

# 规则：放行来自 CN 的请求
[[site.example.rules]]
id = "allow-cn"
description = "allow traffic from China"
condition = 'ctx.geoip?.countryCode === "CN"'
browser_challenge = { enabled = false }